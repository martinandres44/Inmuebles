function rPanel(){var s=ST();var ml=s.mor<.1?“grn”:s.mor<.25?“yel”:“red”,mll=s.mor<.1?“BAJO”:s.mor<.25?“MEDIO”:“ALTO”;var al=s.am>=4?“grn”:s.am>=3?“yel”:“red”,all=s.am>=4?“BUENO”:s.am>=3?“REGULAR”:“MALO”;var vl=s.avP<20?“grn”:s.avP<40?“yel”:“red”,vll=s.avP<20?“OPTIMO”:s.avP<40?“MODERADO”:“CRITICO”;var cl=s.oc<=1?“grn”:s.oc<=3?“yel”:“red”,cll=s.oc<=1?“BAJO”:s.oc<=3?“MEDIO”:“ALTO”;var er=””;for(var j=0;j<s.a.length;j++){var c=s.a[j];var pc=0;for(var k=0;k<D.payments.length;k++)if(D.payments[k].contractId===c.id&&D.payments[k].paid)pc++;er+=”<tr><td style="font-weight:600">”+E(gP(c.propertyId).name||””)+”</td><td style="color:#94a3b8">”+E(gT(c.tenantId).name||””)+”</td><td>”+fmt(c.rent)+”</td><td style="color:”+(c.commission>0?”#22c55e”:”#ef4444”)+”;font-weight:700">”+c.commission+”%</td><td style="color:#8b5cf6;font-weight:700">”+fmt(c.rent*c.commission/100)+”</td><td>”+fmt(pc*c.rent*c.commission/100)+”</td></tr>”}var ow=””;for(var j=0;j<D.owners.length;j++){var o=D.owners[j];var oq=0,mo=false;for(var k=0;k<D.complaints.length;k++)if(D.complaints[k].ownerId===o.id&&D.complaints[k].status===“abierta”)oq++;for(var k=0;k<D.contracts.length;k++){var cc=D.contracts[k];if(cc.ownerId===o.id&&cc.active)for(var m=0;m<D.payments.length;m++)if(D.payments[m].contractId===cc.id&&!D.payments[m].paid)mo=true}var tg=””;if(mo)tg+=”<span class="owt" style="background:rgba(234,179,8,.12);color:#eab308">⚠ Moroso</span>”;if(oq>0)tg+=”<span class="owt" style="background:rgba(239,68,68,.12);color:#ef4444">🔧 Queja</span>”;ow+=”<div class="ow"><div class="owl"><div class="av" style="background:”+AV(o.name)+”">”+IN(o.name)+”</div><div><div style="font-weight:600;font-size:14px">”+E(o.name)+”</div><div style="margin-top:4px">”+tg+”</div></div></div><div style="display:flex;align-items:center;gap:8px"><span style="color:#94a3b8;font-size:12px">Animo</span><span style="font-size:20px">”+MJ(o.mood)+”</span><span style="font-weight:700">”+o.mood+”</span></div></div>”}return “<div class="hero"><div class="hl">Monto total administrado</div><div class="ha">”+fmt(s.tm)+”</div><div class="hs">Alquileres: “+fmt(s.tr)+”/mes + Depositos: “+fmt(s.td)+”</div><div class="hp"><div class="pl plg"><div class="plb">💵 INGRESO RECURRENTE</div><div class="plv">”+fmt(s.mc)+”<span>/mes</span></div></div><div class="pl plp"><div class="plb">💼 COMISIONES</div><div class="plv">”+fmt(s.mc*12)+”<span>/ano</span></div></div></div><div class="hf">”+D.properties.length+” propiedades | “+D.owners.length+” propietarios | “+s.a.length+” inquilinos activos</div></div><div class="st">🎛 Tablero de Control</div><div class="cg"><div class="cc “+ml+”"><div class="dt"></div><div class="ct">MOROSIDAD</div><div class="cv">”+mll+”</div><div class="cd">”+s.up.length+” pendientes</div></div><div class="cc “+al+”"><div class="dt"></div><div class="ct">ANIMO PROPIETARIOS</div><div class="cv">”+all+”</div><div class="cd">Promedio: “+s.am.toFixed(1)+”/5</div></div><div class="cc “+vl+”"><div class="dt"></div><div class="ct">DISPONIBILIDAD</div><div class="cv">”+vll+”</div><div class="cd">”+s.avC+”/”+D.properties.length+” (”+Math.round(s.avP)+”%)</div></div><div class="cc “+cl+”"><div class="dt"></div><div class="ct">QUEJAS ABIERTAS</div><div class="cv">”+cll+”</div><div class="cd">”+s.oc+” sin resolver</div></div></div><div class="sp"><div><div class="st">💰 Ganancias por Propiedad</div><div class="cd2"><table><thead><tr><th>Propiedad</th><th>Inquilino</th><th>Alquiler</th><th>Com.</th><th>Gan/mes</th><th>Total</th></tr></thead><tbody>”+(er||”<tr><td colspan="6" class="em">Sin contratos</td></tr>”)+”</tbody></table></div></div><div><div class="st">😊 Animo por Propietario</div>”+(ow||”<div class="em">Sin propietarios</div>”)+”</div></div>”}

function rDash(){var s=ST(),now=new Date(),cm=now.getFullYear()+”-”+String(now.getMonth()+1).padStart(2,“0”);var pTM=0,pdTM=0;for(var i=0;i<D.payments.length;i++){if(D.payments[i].paid&&D.payments[i].month===cm)pTM+=D.payments[i].amount;if(!D.payments[i].paid&&D.payments[i].month===cm)pdTM+=D.payments[i].amount}var cr=””;for(var j=0;j<s.a.length;j++){var c=s.a[j];cr+=”<div class="lr"><div><strong>”+E(gP(c.propertyId).name||””)+”</strong> <span style="color:#64748b">- “+E(gT(c.tenantId).name||””)+”</span></div><span style="color:#22c55e;font-weight:700">”+fmt(c.rent)+”</span></div>”}var pr=””;for(var j=0;j<s.up.length;j++){var p=s.up[j];var cc=gC(p.contractId);pr+=”<div class="lr"><div><strong>”+E(gP(cc.propertyId).name||””)+”</strong> <span style="color:#64748b">”+p.month+”</span></div><div style="display:flex;align-items:center;gap:10px"><span style="color:#ef4444;font-weight:700">”+fmt(p.amount)+”</span><button class="btc" onclick="MP(’”+p.id+”’)">Cobrar</button></div></div>”}return “<div class="sh"><h3>📊 Dashboard</h3></div><div class="dg"><div class="dc"><div class="di">🏠</div><div class="dl">Alquileres mensuales</div><div class="dv" style="color:#22c55e">”+fmt(s.tr)+”</div></div><div class="dc"><div class="di">💼</div><div class="dl">Comisiones mensuales</div><div class="dv" style="color:#8b5cf6">”+fmt(s.mc)+”</div></div><div class="dc"><div class="di">✅</div><div class="dl">Cobrado este mes</div><div class="dv" style="color:#06b6d4">”+fmt(pTM)+”</div></div><div class="dc"><div class="di">⏳</div><div class="dl">Pendiente este mes</div><div class="dv" style="color:#ef4444">”+fmt(pdTM)+”</div></div></div><div class="sp"><div class="cd2"><div class="cd2b"><h4 style="font-weight:700;margin-bottom:14px">Contratos activos</h4>”+(cr||”<div class="em">Sin contratos</div>”)+”</div></div><div class="cd2"><div class="cd2b"><h4 style="font-weight:700;margin-bottom:14px">Pagos pendientes</h4>”+(pr||”<div class="em">Sin pendientes</div>”)+”</div></div></div>”}
