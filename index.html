function stats(){

mor=a.length>0?mC/a.length:0,avC=D.properties.filter(p=>p.available).length,

am=D.owners.length>0?(D.owners.reduce((s,o)=>s+(o.mood||3),0)/D.owners.length):3;
return{tm,tr,td,mc,mor,avC,avP,oc,am,a,up};
}

function delI(col,id){if(!confirm(’¿Eliminar?’))return;D[col]=D[col].filter(x=>x.id!==id);save()}
function markP(id){const p=D.payments.find(x=>x.id===id);if(p){p.paid=true;p.paidDate=new Date().toISOString().split(‘T’)[0]}save()}

// Generic CRUD table renderer
function crudTable(col,title,icon,cols,formFn){
let rows=’’;D[col].forEach(item=>{
let cells=cols.map(c=>{let v=c.r?c.r(item):esc(String(item[c.k]||’’));return`<td${c.s?' style="'+c.s+'"':''}>${v}</td>`}).join(’’);
// We need to pass the item data to the edit form via a global temp
cells+=`<td style="text-align:center"><button class="bti" onclick="editItem('${col}','${item.id}','${formFn}')" title="Editar">✏️</button><button class="bti" onclick="delI('${col}','${item.id}')" title="Eliminar">🗑️</button></td>`;
rows+=`<tr>${cells}</tr>`;
});
const ths=cols.map(c=>`<th>${c.l}</th>`).join(’’)+’<th style="text-align:center">Acciones</th>’;
return`<div class="sh"><h3>${icon} ${title}</h3><button class="btn btn1" onclick="openM('Nuevo',${formFn}())">+ Agregar</button></div>

  <div class="card"><table><thead><tr>${ths}</tr></thead><tbody>${rows||`<tr><td colspan="${cols.length+1}" class="empty">No hay registros. ¡Agregá uno!</td></tr>`}</tbody></table></div>`;
}

function editItem(col,id,formFn){
const item=D[col].find(x=>x.id===id);
if(item)openM(‘Editar’,window[formFn](item));
}
